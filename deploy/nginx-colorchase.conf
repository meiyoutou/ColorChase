# ColorChase production Nginx reverse proxy template.
# Replace certificate paths before enabling this file.

map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

limit_req_zone $binary_remote_addr zone=colorchase_api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=colorchase_upload:10m rate=20r/m;

upstream colorchase_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name colorchase.meiyoutou.top ColorChase.meiyoutou.top;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name colorchase.meiyoutou.top ColorChase.meiyoutou.top;

    ssl_certificate /etc/letsencrypt/live/colorchase.meiyoutou.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/colorchase.meiyoutou.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 300m;
    client_body_timeout 120s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location ~ ^/api/(upload_batch|train/upload|prepare_lr_preset|apply_profile|apply_style|semantic/match|depth/layers|mask/subject|projects/space_profile/avatar|projects/[^/]+/upload|capture_style|preview_upload|video_metadata|video_transfer|export_video|transfer) {
        limit_req zone=colorchase_upload burst=20 nodelay;
        proxy_pass http://colorchase_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
    }

    location /api/ {
        limit_req zone=colorchase_api burst=60 nodelay;
        proxy_pass http://colorchase_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
    }

    location /static/ {
        proxy_pass http://colorchase_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://colorchase_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
    }
}
