<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="Training dataset panel">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#09090b"/><stop offset="1" stop-color="#172033"/></linearGradient>
    <linearGradient id="purple" x1="0" x2="1"><stop offset="0" stop-color="#818cf8"/><stop offset="1" stop-color="#22d3ee"/></linearGradient>
  </defs>
  <rect width="1200" height="520" rx="32" fill="url(#bg)"/>
  <rect x="70" y="70" width="1060" height="380" rx="28" fill="#111827" stroke="#263248"/>
