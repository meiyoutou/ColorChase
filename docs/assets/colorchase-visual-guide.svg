<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1600" viewBox="0 0 1400 1600" role="img" aria-label="ColorChase visual feature guide">
  <defs>
    <linearGradient id="hero" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.52" stop-color="#24163a"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#a3e635"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" x2="1">
      <stop offset="0" stop-color="#fb7185"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity="0.22"/>
    </filter>
    <style>
      .title{font-family:Segoe UI,Arial,sans-serif;font-size:58px;font-weight:900;fill:#f8fafc}
      .subtitle{font-family:Segoe UI,Arial,sans-serif;font-size:24px;font-weight:600;fill:#cbd5e1}
      .section{font-family:Segoe UI,Arial,sans-serif;font-size:28px;font-weight:850;fill:#0f172a}
      .label{font-family:Segoe UI,Arial,sans-serif;font-size:20px;font-weight:800;fill:#111827}
      .small{font-family:Segoe UI,Arial,sans-serif;font-size:16px;font-weight:600;fill:#64748b}
      .tiny{font-family:Segoe UI,Arial,sans-serif;font-size:14px;font-weight:650;fill:#94a3b8}
      .chip{font-family:Segoe UI,Arial,sans-serif;font-size:15px;font-weight:800;fill:#0f172a}
    </style>
  </defs>
  <rect width="1400" height="1600" rx="44" fill="#f8fafc"/>
  <rect x="40" y="40" width="1320" height="260" rx="36" fill="url(#hero)"/>
  <circle cx="1170" cy="70" r="210" fill="#818cf8" opacity="0.2"/>
  <circle cx="160" cy="285" r="180" fill="#22d3ee" opacity="0.12"/>
  <text x="92" y="138" class="title">ColorChase</text>
  <text x="96" y="188" class="subtitle">AI image/video color transfer, style presets, training data and user workspace</text>
  <rect x="96" y="224" width="166" height="42" rx="21" fill="url(#blue)"/>
  <text x="126" y="252" class="chip">FastAPI App</text>
  <rect x="282" y="224" width="154" height="42" rx="21" fill="#f8fafc" opacity="0.92"/>
  <text x="318" y="252" class="chip">Web UI</text>
  <rect x="456" y="224" width="154" height="42" rx="21" fill="#f8fafc" opacity="0.92"/>
  <text x="491" y="252" class="chip">AI Models</text>

  <rect x="70" y="350" width="1260" height="300" rx="34" fill="#fff" filter="url(#shadow)"/>
  <text x="110" y="404" class="section">Main Workspace</text>
  <rect x="110" y="438" width="230" height="154" rx="22" fill="#eef2ff"/>
  <text x="138" y="484" class="label">Upload</text>
  <text x="138" y="518" class="small">target image/video</text>
  <text x="138" y="546" class="small">batch or project assets</text>
  <path d="M362 516 H450" stroke="url(#blue)" stroke-width="9" stroke-linecap="round"/>
  <rect x="472" y="438" width="230" height="154" rx="22" fill="#ecfeff"/>
  <text x="500" y="484" class="label">Reference</text>
  <text x="500" y="518" class="small">image, preset or LUT</text>
  <text x="500" y="546" class="small">style source</text>
  <path d="M724 516 H812" stroke="url(#blue)" stroke-width="9" stroke-linecap="round"/>
  <rect x="834" y="438" width="230" height="154" rx="22" fill="#f5f3ff"/>
  <text x="862" y="484" class="label">AI Transfer</text>
  <text x="862" y="518" class="small">ModFlows / DNCM</text>
  <text x="862" y="546" class="small">mask, depth, region</text>
  <path d="M1086 516 H1174" stroke="url(#blue)" stroke-width="9" stroke-linecap="round"/>
  <rect x="1196" y="438" width="94" height="154" rx="22" fill="#dcfce7"/>
  <text x="1218" y="506" class="label">Export</text>
  <text x="1220" y="536" class="small">full</text>

  <rect x="70" y="700" width="600" height="350" rx="34" fill="#fff" filter="url(#shadow)"/>
  <text x="110" y="754" class="section">Image Workflow</text>
  <rect x="110" y="800" width="220" height="150" rx="24" fill="#111827"/>
  <path d="M140 910 C180 830 220 860 300 812" stroke="#22d3ee" stroke-width="10" fill="none" opacity="0.9"/>
  <rect x="370" y="800" width="220" height="150" rx="24" fill="#24163a"/>
  <path d="M400 910 C442 820 500 872 560 810" stroke="#c084fc" stroke-width="10" fill="none" opacity="0.9"/>
  <rect x="110" y="980" width="94" height="34" rx="17" fill="url(#blue)"/>
  <text x="130" y="1003" class="chip">Before</text>
  <rect x="370" y="980" width="84" height="34" rx="17" fill="url(#pink)"/>
  <text x="392" y="1003" class="chip">After</text>

  <rect x="730" y="700" width="600" height="350" rx="34" fill="#fff" filter="url(#shadow)"/>
  <text x="770" y="754" class="section">Video Workflow</text>
  <rect x="770" y="798" width="500" height="96" rx="24" fill="#f1f5f9"/>
  <text x="804" y="836" class="label">Frame pipeline</text>
  <text x="804" y="866" class="small">extract frames → color transfer → assemble video</text>
  <g fill="url(#blue)">
    <rect x="810" y="928" width="60" height="72" rx="14"/>
    <rect x="890" y="912" width="60" height="88" rx="14"/>
    <rect x="970" y="892" width="60" height="108" rx="14"/>
    <rect x="1050" y="920" width="60" height="80" rx="14"/>
    <rect x="1130" y="902" width="60" height="98" rx="14"/>
  </g>

  <rect x="70" y="1100" width="390" height="390" rx="34" fill="#fff" filter="url(#shadow)"/>
  <text x="110" y="1154" class="section">Training</text>
  <rect x="110" y="1192" width="310" height="60" rx="18" fill="#111827"/>
  <text x="136" y="1230" fill="#f8fafc" font-family="Segoe UI,Arial" font-size="20" font-weight="800">Training Dataset</text>
  <rect x="110" y="1282" width="144" height="82" rx="20" fill="#eef2ff" stroke="#818cf8" stroke-dasharray="7 7"/>
  <text x="134" y="1328" class="label">Images</text>
  <rect x="276" y="1282" width="144" height="82" rx="20" fill="#ecfdf5" stroke="#34d399" stroke-dasharray="7 7"/>
  <text x="300" y="1328" class="label">Folder</text>
  <rect x="110" y="1400" width="310" height="42" rx="21" fill="url(#green)"/>
  <text x="206" y="1428" class="chip">Train & Refresh</text>

  <rect x="505" y="1100" width="390" height="390" rx="34" fill="#fff" filter="url(#shadow)"/>
  <text x="545" y="1154" class="section">User Space</text>
  <rect x="545" y="1194" width="310" height="74" rx="20" fill="#eef2ff"/>
  <text x="572" y="1238" class="label">Profile + Metrics</text>
  <rect x="545" y="1300" width="140" height="92" rx="20" fill="#f1f5f9"/>
  <text x="577" y="1354" class="label">Tasks</text>
  <rect x="715" y="1300" width="140" height="92" rx="20" fill="#f1f5f9"/>
  <text x="746" y="1354" class="label">Storage</text>
  <rect x="545" y="1424" width="310" height="34" rx="17" fill="url(#blue)"/>

  <rect x="940" y="1100" width="390" height="390" rx="34" fill="#fff" filter="url(#shadow)"/>
  <text x="980" y="1154" class="section">Admin Center</text>
  <rect x="980" y="1194" width="310" height="56" rx="18" fill="#fee2e2"/>
  <text x="1008" y="1230" class="label">Task Logs</text>
  <rect x="980" y="1276" width="310" height="56" rx="18" fill="#ede9fe"/>
  <text x="1008" y="1312" class="label">Model Status</text>
  <rect x="980" y="1358" width="310" height="56" rx="18" fill="#dcfce7"/>
  <text x="1008" y="1394" class="label">Storage / Training</text>
  <rect x="980" y="1438" width="310" height="18" rx="9" fill="#e2e8f0"/>
</svg>
